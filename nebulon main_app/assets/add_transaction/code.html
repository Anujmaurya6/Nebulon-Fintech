<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Transaction | Executive Assistant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#ffffff",
                        "surface-container": "#f0edec",
                        "tertiary-container": "#830012",
                        "surface-container-low": "#f6f3f2",
                        "error-container": "#ffdad6",
                        "on-surface": "#1c1b1b",
                        "primary": "#101a77",
                        "on-background": "#1c1b1b",
                        "on-secondary-fixed-variant": "#005145",
                        "secondary-container": "#68fadd",
                        "tertiary": "#5a0009",
                        "error": "#ba1a1a",
                        "surface-container-high": "#ebe7e7",
                        "inverse-on-surface": "#f3f0ef",
                        "on-secondary-fixed": "#00201a",
                        "surface-variant": "#e5e2e1",
                        "on-primary-fixed": "#000767",
                        "secondary": "#006b5c",
                        "on-tertiary-container": "#ff8680",
                        "on-surface-variant": "#464652",
                        "surface": "#fcf9f8",
                        "tertiary-fixed-dim": "#ffb3ae",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#68fadd",
                        "outline-variant": "#c7c5d4",
                        "background": "#fcf9f8",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#e0e0ff",
                        "outline": "#777683",
                        "primary-fixed-dim": "#bdc2ff",
                        "surface-bright": "#fcf9f8",
                        "on-tertiary-fixed-variant": "#930015",
                        "on-secondary-container": "#007261",
                        "surface-dim": "#dcd9d9",
                        "secondary-fixed-dim": "#44ddc1",
                        "surface-tint": "#4c56af",
                        "primary-container": "#2b348d",
                        "surface-container-highest": "#e5e2e1",
                        "on-tertiary-fixed": "#410004",
                        "tertiary-fixed": "#ffdad7",
                        "inverse-primary": "#bdc2ff",
                        "inverse-surface": "#313030",
                        "on-primary-fixed-variant": "#343d96",
                        "on-primary-container": "#99a2ff",
                        "on-primary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<!-- Top Navigation Anchor -->
<header class="bg-[#fcf9f8] dark:bg-slate-950 sticky top-0 z-50">
<div class="flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#ebe7e7] dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface" data-icon="close">close</span>
</button>
</div>
<h1 class="font-['Manrope'] font-bold tracking-tight text-[#1c1b1b] dark:text-slate-100 text-lg">Add Transaction</h1>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#101a77] dark:text-[#bdc2ff]" data-icon="sync">sync</span>
</div>
</div>
</header>
<main class="max-w-xl mx-auto px-6 pt-12 pb-32">
<!-- Transaction Type Toggle -->
<div class="flex justify-center mb-12">
<div class="bg-surface-container-low p-1.5 rounded-full flex w-full max-w-[320px]">
<button class="flex-1 py-3 px-6 rounded-full font-headline font-bold text-sm transition-all duration-200 bg-surface-container-lowest text-primary shadow-sm">
                    Expense
                </button>
<button class="flex-1 py-3 px-6 rounded-full font-headline font-bold text-sm transition-all duration-200 text-outline hover:text-on-surface">
                    Income
                </button>
</div>
</div>
<!-- Amount Input Section -->
<div class="text-center mb-16">
<label class="font-label text-[10px] font-medium uppercase tracking-[0.15em] text-outline mb-2 block">Transaction Amount</label>
<div class="relative inline-flex items-center">
<span class="text-3xl font-headline font-extrabold text-primary-container/40 mr-2">$</span>
<input class="bg-transparent border-none text-center font-headline font-extrabold text-6xl tracking-tighter text-on-surface placeholder:text-surface-container-highest focus:ring-0 w-full max-w-[300px]" placeholder="0.00" type="text"/>
</div>
</div>
<!-- Form Fields Card -->
<div class="space-y-6">
<!-- Category Selection -->
<div class="bg-surface-container-low rounded-xl p-5 hover:bg-surface-container-high transition-colors cursor-pointer flex items-center justify-between group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="category">category</span>
</div>
<div>
<p class="font-label text-[10px] font-medium uppercase tracking-widest text-outline">Category</p>
<p class="font-headline font-bold text-on-surface">Select Category</p>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Date Picker -->
<div class="bg-surface-container-low rounded-xl p-5 hover:bg-surface-container-high transition-colors cursor-pointer flex items-center gap-4 group">
<div class="w-12 h-12 rounded-full bg-surface-container-lowest flex items-center justify-center text-outline group-hover:text-primary">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<div class="flex-1">
<p class="font-label text-[10px] font-medium uppercase tracking-widest text-outline">Date</p>
<p class="font-headline font-bold text-on-surface">Today, Oct 24</p>
</div>
</div>
<!-- Account Selector -->
<div class="bg-surface-container-low rounded-xl p-5 hover:bg-surface-container-high transition-colors cursor-pointer flex items-center gap-4 group">
<div class="w-12 h-12 rounded-full bg-surface-container-lowest flex items-center justify-center text-outline group-hover:text-primary">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<div class="flex-1">
<p class="font-label text-[10px] font-medium uppercase tracking-widest text-outline">Account</p>
<p class="font-headline font-bold text-on-surface">Platinum Card</p>
</div>
</div>
</div>
<!-- Notes Field -->
<div class="bg-surface-container-low rounded-xl p-5 focus-within:bg-surface-container-high transition-colors">
<div class="flex items-start gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-lowest flex items-center justify-center text-outline shrink-0">
<span class="material-symbols-outlined" data-icon="notes">notes</span>
</div>
<div class="flex-1">
<p class="font-label text-[10px] font-medium uppercase tracking-widest text-outline mb-1">Add Note</p>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 font-body text-on-surface placeholder:text-outline/60 resize-none" placeholder="What was this for?" rows="2"></textarea>
</div>
</div>
</div>
<!-- Receipt Upload (Extra Detail) -->
<div class="border-2 border-dashed border-outline-variant/30 rounded-xl p-8 flex flex-col items-center justify-center gap-3 hover:border-primary/30 transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-outline group-hover:bg-primary-fixed group-hover:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
</div>
<p class="font-label text-sm font-medium text-outline">Attach Receipt</p>
</div>
</div>
<!-- Primary Action -->
<div class="mt-12">
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-container text-white rounded-full font-headline font-extrabold text-lg shadow-[0_12px_40px_rgba(16,26,119,0.2)] hover:shadow-[0_12px_45px_rgba(16,26,119,0.3)] active:scale-[0.98] transition-all duration-200">
                Save Transaction
            </button>
</div>
<!-- Status Footer -->
<div class="mt-8 flex items-center justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<span class="font-label text-[10px] font-medium uppercase tracking-widest text-secondary">Synced with Global Ledger</span>
</div>
</main>
<!-- Bottom Navigation Logic (Suppressed for focused task) -->
<!-- Visual Accent Element -->
<div class="fixed top-0 right-0 w-64 h-64 bg-primary/5 blur-[100px] pointer-events-none -z-10 rounded-full"></div>
<div class="fixed bottom-0 left-0 w-96 h-96 bg-secondary/5 blur-[120px] pointer-events-none -z-10 rounded-full"></div>
</body></html>
