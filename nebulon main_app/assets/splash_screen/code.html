<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vault - Executive Assistant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "surface-container": "#f0edec",
              "tertiary-container": "#830012",
              "surface-container-low": "#f6f3f2",

              "tertiary": "#5a0009",

              "inverse-on-surface": "#f3f0ef",
              "on-secondary-fixed": "#00201a",
              "surface-variant": "#e5e2e1",
              "on-primary-fixed": "#000767",
              "secondary": "#006b5c",
              "on-tertiary-container": "#ff8680",
              "on-surface-variant": "#464652",
              "surface": "#fcf9f8",
              "tertiary-fixed-dim": "#ffb3ae",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#68fadd",
              "outline-variant": "#c7c5d4",
              "background": "#fcf9f8",
              "on-secondary": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-error-container": "#93000a",
              "primary-fixed": "#e0e0ff",

              "on-secondary-container": "#007261",
              "surface-dim": "#dcd9d9",

              "surface-tint": "#4c56af",
              "primary-container": "#2b348d",
              "surface-container-highest": "#e5e2e1",
              "on-tertiary-fixed": "#410004",
              "tertiary-fixed": "#ffdad7",
              "inverse-primary": "#bdc2ff",

              "on-primary-fixed-variant": "#343d96",

<style>
      .glass-effect {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .logo-glow {
        filter: drop-shadow(0 0 20px rgba(104, 250, 221, 0.3));
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-gradient-to-br from-primary via-primary-container to-secondary overflow-hidden">
<!-- Abstract Background Decorative Elements (The "Digital Concierge" airy feel) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[60%] h-[60%] rounded-full bg-secondary opacity-10 blur-[120px]"></div>
<div class="absolute top-[40%] -right-[10%] w-[50%] h-[50%] rounded-full bg-primary-fixed-dim opacity-20 blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[20%] w-[40%] h-[40%] rounded-full bg-on-secondary-container opacity-10 blur-[110px]"></div>
</div>
<!-- Central Branding Cluster -->
<div class="relative z-10 flex flex-col items-center gap-12">
<!-- Logo Icon: Stylized 'V' -->
<div class="relative group">
<div class="w-32 h-32 md:w-40 md:h-40 glass-effect rounded-[32px] flex items-center justify-center transform transition-transform duration-700 hover:scale-105 border border-white/10 shadow-2xl">
<svg class="logo-glow" fill="none" height="60" viewbox="0 0 80 80" width="60" xmlns="http://www.w3.org/2000/svg">
<!-- Stylized Geometric V -->
<path d="M10 10L40 70L70 10" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"></path>
<path d="M25 10L40 40L55 10" opacity="0.8" stroke="#68fadd" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
</svg>
</div>
<!-- Subtle inner glow for "Growth" signal -->
<div class="absolute -inset-4 bg-secondary-fixed/10 blur-2xl rounded-full -z-10"></div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4">
<h1 class="font-headline text-white text-5xl md:text-6xl font-extrabold tracking-tighter">
                    Vault
                </h1>
<!-- Tagline with Editorial Authority -->
<div class="flex items-center gap-3 justify-center">
<span class="font-label text-secondary-fixed text-xs font-bold tracking-[0.2em] uppercase opacity-90">Track</span>
<span class="w-1 h-1 rounded-full bg-white/30"></span>
<span class="font-label text-secondary-fixed text-xs font-bold tracking-[0.2em] uppercase opacity-90">Understand</span>
<span class="w-1 h-1 rounded-full bg-white/30"></span>
<span class="font-label text-secondary-fixed text-xs font-bold tracking-[0.2em] uppercase opacity-90">Grow</span>
</div>
</div>
</div>
<!-- Footer / Progress Indicator -->
<div class="absolute bottom-16 w-full flex flex-col items-center gap-6">
<!-- Subtle Loading Bar -->
<div class="w-48 h-[2px] bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-secondary-fixed to-primary-fixed-dim w-[65%] rounded-full shadow-[0_0_8px_rgba(104,250,221,0.5)]"></div>
</div>
<p class="font-body text-white/40 text-[10px] tracking-widest uppercase">
                Secured by Executive Intelligence
            </p>
</div>
<!-- Decorative "Financial Signal" Organic Shapes -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<svg class="absolute bottom-0 left-0 w-full h-1/3" fill="none" preserveaspectratio="none" viewbox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">
<path d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,224C960,245,1056,235,1152,208C1248,181,1344,139,1392,117.3L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z" fill="url(#paint0_linear_splash)" fill-opacity="0.3"></path>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="paint0_linear_splash" x1="720" x2="720" y1="96" y2="320">
<stop stop-color="#68fadd"></stop>
<stop offset="1" stop-color="#101a77" stop-opacity="0"></stop>
</lineargradient>
</defs>
</svg>
</div>
</main>
<!-- Contextual Decorative Overlay (Glossmorphism highlight) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none border-[24px] border-white/5 z-50 rounded-[40px] md:rounded-[64px]"></div>
</body></html>
