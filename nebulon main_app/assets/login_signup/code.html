<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .premium-gradient {
            background: linear-gradient(135deg, #101a77 0%, #2b348d 100%);
        }
        .glow-effect {
            box-shadow: 0 12px 40px rgba(16, 26, 119, 0.15);
        }
        .soft-mesh {
            background-color: #fcf9f8;
            background-image: radial-gradient(at 0% 0%, rgba(104, 250, 221, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(16, 26, 119, 0.03) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface soft-mesh min-h-screen flex items-center justify-center p-6">
<!-- Auth Shell Suppression Logic applied: No TopAppBar or BottomNavBar as this is a Focused/Transactional screen -->
<main class="w-full max-w-[480px] space-y-12">
<!-- Brand Identity Header -->
<header class="text-center space-y-4">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl premium-gradient text-white mb-6 glow-effect">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-primary">Executive Assistant</h1>
<p class="font-body text-outline text-lg">Intelligent wealth management for the modern era.</p>
</header>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 glow-effect border border-outline-variant/10">
<form class="space-y-6">
<!-- Form Header -->
<div class="space-y-1 pb-2">
<h2 class="font-headline font-bold text-2xl">Welcome back</h2>
<p class="font-label text-sm text-outline uppercase tracking-widest">Enter your credentials to access your vault</p>
</div>
<!-- Input Group: Email -->
<div class="space-y-2">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-fixed-dim font-body text-on-surface transition-all placeholder:text-outline/60" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-secondary hover:text-on-secondary-container transition-colors" href="#">Forgot Access?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-fixed-dim font-body text-on-surface transition-all placeholder:text-outline/60" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full premium-gradient text-white font-headline font-bold py-4 rounded-full glow-effect hover:scale-[1.02] active:scale-95 transition-all duration-200 mt-4" type="submit">
                    Sign In to Dashboard
                </button>
<!-- Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-outline font-label text-[10px] uppercase tracking-widest">Secure third-party access</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-low hover:bg-surface-container-high py-3 rounded-xl transition-colors border border-outline-variant/5" type="button">
<img alt="Apple" class="w-5 h-5" data-alt="minimal black apple logo icon for sign in button" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAYkYXk2hZCVahwgUIVq2m-8xmQ3_eUxacIK1-5XY5Nsr5ohI0c5Z2QUIFRxbyuy3sMAMxkt5OXyQAKKYazVWZXqHm_mRghOJJLuTp80KD7xq9bfReFcg2r2pRhWD6JBh2wgmTiqFUFyQwvcWt599-TOIKatTScrPdsUcIyg4cMAxlZGJJxdKyOFqUuBOEjzuUFEI4D_D6r2cg_NvLdY0Vt7JCkT87K5Giim2uFnrNm6lqyP5wIcPIkuTkZw65Y0isXGx1Ng92BA"/>
<span class="font-body font-semibold text-sm">Apple</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-low hover:bg-surface-container-high py-3 rounded-xl transition-colors border border-outline-variant/5" type="button">
<img alt="Google" class="w-5 h-5" data-alt="colorful google G logo icon for secure sign in" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsWX8D7FjiMNEydPcmvVSTPs_BVPmQhOKOoUFN7--F4eFrRX-ENTa0k3QpfB6Lm1OlDVrkxhubfHgBCQOa2AmHCc860Y3XhtqfUq_Ilimo2WBpS4aMiN26tVeR7abYQfKG8HmQJPGmnaRRFDb9coSRApzG6_Kd-1EMI5Ky42CGrc5KaeqVjWoh9CiMJe4BxuMk1IqimQ02GZRxLqZTIB8LmWszvO2-RTrCxNoz99kIieDJTXIgopnDoUCHz1EgEKtJk5TUSEhT2A"/>
<span class="font-body font-semibold text-sm">Google</span>
</button>
</div>
</form>
</div>
<!-- Footer Link -->
<footer class="text-center pb-8">
<p class="text-outline-variant font-body">
                Don't have an account yet? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Request Membership</a>
</p>
</footer>
</main>
<!-- Visual Accents (Editorial Precision) -->
<div class="fixed top-20 right-[10%] opacity-20 hidden lg:block">
<div class="w-64 h-64 rounded-full bg-secondary-fixed blur-[100px]"></div>
</div>
<div class="fixed bottom-20 left-[10%] opacity-10 hidden lg:block">
<div class="w-80 h-80 rounded-full bg-primary-fixed blur-[120px]"></div>
</div>
</body></html>
